name: H1.16 Campaign Workspace Validation

on:
  push:
    branches:
      - h1-16-campaign-workspace
  pull_request:
    branches:
      - h1-15-market-intelligence
      - h1-16-campaign-workspace
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Campaign workspace tests
        run: npm run test:campaign-workspace

      - name: Production build
        run: npm run build
