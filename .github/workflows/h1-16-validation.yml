name: H1.16 Campaign Workspace Validation

on:
  push:
    branches:
      - h1-16-campaign-workspace
  pull_request:
    branches:
      - h1-15-market-intelligence
      - h1-16-campaign-workspace
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Campaign workspace tests
        run: npm run test:campaign-workspace

      - name: Production build
        shell: bash
        run: |
          set +e
          npm run build > h1-16-build.log 2>&1
          code=$?
          echo "$code" > h1-16-build-status.txt
          tail -n 160 h1-16-build.log
          exit 0

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: h1-16-build-diagnostics
          path: |
            h1-16-build.log
            h1-16-build-status.txt
          if-no-files-found: error
          retention-days: 3

      - name: Enforce build result
        shell: bash
        run: |
          code=$(cat h1-16-build-status.txt)
          if [ "$code" != "0" ]; then
            echo "Production build failed with exit code $code."
            exit "$code"
          fi
