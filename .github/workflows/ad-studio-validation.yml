name: Ad Studio Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/app/(app)/ad-studio/**"
      - "src/app/(app)/campaigns/[campaignId]/**"
      - "src/app/api/ad-studio/**"
      - "src/components/ad-studio/**"
      - "src/lib/ad-studio/**"
      - "src/lib/navigation/**"
      - "tests/ad-studio-*.test.ts"
      - "tests/app-navigation.test.ts"
      - "package.json"
      - ".github/workflows/ad-studio-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run Ad Studio tests
        run: npm run test:ad-studio

      - name: Run navigation regression tests
        run: npm run test:navigation

      - name: Typecheck
        run: npm run typecheck

      - name: Build production application
        run: npm run build
