name: H1.18 Batch Workspace

on:
  push:
    branches:
      - h1-18-unified-video-studio
    paths:
      - ".github/workflows/h1-18-batch-workspace.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/h1-18-batch-workspace.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Capture commit and tree
        run: |
          git rev-parse HEAD > .h1-18-commit-sha
          git rev-parse HEAD^{tree} > .h1-18-tree-sha
          echo "COMMIT_SHA=$(cat .h1-18-commit-sha)"
          echo "TREE_SHA=$(cat .h1-18-tree-sha)"

      - name: Upload source workspace
        uses: actions/upload-artifact@v4
        with:
          name: h1-18-source-workspace
          path: |
            .
            !.git/**
            !node_modules/**
            !.next/**
          include-hidden-files: true
          retention-days: 2
